<!DOCTYPE html>
<!--
  ============================================================
  CONCEPT: The HTML Boilerplate
  ============================================================
  Every HTML page starts with the same skeleton.

  <!DOCTYPE html>  → tells the browser "this is HTML5".
                     Without it, browsers fall back to "quirks mode"
                     and render older, inconsistent layouts.

  <html>           → the root element. Wraps the whole document.
                     The lang="en" attribute helps screen readers
                     and search engines understand the language.

  <head>           → metadata about the page (NOT shown to user).
                     Title, character set, viewport, links to CSS, etc.

  <body>           → everything visible in the browser window.
  ============================================================
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- charset=UTF-8 lets the page render any character (₹, é, 你好, 😀) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- viewport tag → makes page responsive on mobile devices -->

    <title>My First HTML Page</title>
    <!-- title shows in browser tab and search results -->
  </head>
  <body>
    <h1>Hello, HTML!</h1>
    <p>This is my very first HTML page.</p>

    <!--
      How to view this file:
      Just double-click it — it opens in your default browser.
      No server, no build tools. HTML runs natively in browsers.
    -->
  </body>
</html>
