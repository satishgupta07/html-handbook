<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Input Types</title>
    <style>
      form { max-width: 480px; padding: 1rem; border: 1px solid #ccc; }
      label { display: block; margin-top: 0.75rem; font-weight: 600; }
      input { display: block; margin-top: 0.25rem; padding: 0.4rem; }
      .row { display: flex; gap: 1rem; margin-top: 0.5rem; }
    </style>
  </head>
  <body>
    <!--
      ============================================================
      CONCEPT: Input types
      ============================================================
      A single <input> element does many jobs — the "type" decides which.
      Modern types unlock built-in validation, mobile keyboards, and pickers.
      ============================================================
    -->

    <form>
      <label for="t-text">text — single line</label>
      <input type="text" id="t-text" name="text" />

      <label for="t-email">email — validates email format</label>
      <input type="email" id="t-email" name="email" placeholder="you@example.com" />

      <label for="t-pass">password — masks input</label>
      <input type="password" id="t-pass" name="pass" />

      <label for="t-num">number — only digits, with min/max/step</label>
      <input type="number" id="t-num" name="num" min="0" max="100" step="5" />

      <label for="t-tel">tel — phone (mobile shows numeric keypad)</label>
      <input type="tel" id="t-tel" name="tel" />

      <label for="t-url">url — validates URL format</label>
      <input type="url" id="t-url" name="url" placeholder="https://..." />

      <label for="t-search">search — text with a clear-X button</label>
      <input type="search" id="t-search" name="q" />

      <label for="t-date">date — opens a date picker</label>
      <input type="date" id="t-date" name="date" />

      <label for="t-time">time</label>
      <input type="time" id="t-time" name="time" />

      <label for="t-color">color — opens a color picker</label>
      <input type="color" id="t-color" name="color" />

      <label for="t-range">range — slider</label>
      <input type="range" id="t-range" name="range" min="0" max="100" />

      <label for="t-file">file — file picker</label>
      <input type="file" id="t-file" name="file" accept=".jpg,.png,.pdf" />

      <label>hidden — invisible field, sent with form</label>
      <input type="hidden" name="csrf_token" value="abc123" />

      <p><em>Open the browser dev tools to see how each type behaves
      differently on submit, and try them on a phone for the mobile keyboards.</em></p>

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
